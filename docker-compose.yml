services:
  mysql:
    image : mysql:5.7
    container_name : mysql
    environment:
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: jai_db
    
    volumes:
      - ./mysql-data:/var/lib/mysql
    
    networks:
      - two-tier

    ports:
      - "3306:3306" 

    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-uroot","-padmin"] 
      interval: 10s
      retries: 5
      start_period: 60s
      timeout: 5s    


  flaskapp:
    build:
      context: .
    container_name: flask_app
    environment:
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: admin
      MYSQL_USER: admin
      MYSQL_DB: jai_db
    networks:
      - two-tier
    ports:
      - "5000:5000" 
    depends_on:
      - mysql
    restart: always






volumes:
  mysql-data:

networks:
  two-tier:
